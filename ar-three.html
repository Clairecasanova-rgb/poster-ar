<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#000000">
  <title>Poster AR (Three.js)</title>
  <link rel="stylesheet" href="css/ui.css">

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.147.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
  </script>
</head>
<body class="ar">

  <div id="start-overlay" class="overlay-screen">
    <div class="card">
      <h2>AR plaque</h2>
      <p>Pointe vers l'image cible apres avoir active la camera.</p>
      <button id="start-btn" class="btn primary">Activer la camera</button>
      <a href="ar.html" class="btn-link">Fallback HTML overlay</a>
    </div>
  </div>

  <div id="ui-overlay" class="hidden">
    <a href="index.html" class="btn-icon back" aria-label="Retour">&larr;</a>
    <button id="cam-toggle" class="cam-toggle" aria-label="Mode camera" title="Basculer vue camera (plein / complete)">&#x21F2;</button>
    <div id="hint" class="hint">Pointez vers une image du poster</div>
    <div id="scan-frame" class="scan-frame"><span></span></div>
  </div>

  <div id="container"></div>

  <!-- Overlay video plein ecran (apparait apres detection avec anim zoom-in) -->
  <div id="video-overlay" class="video-overlay">
    <button id="video-close" class="video-close" aria-label="Fermer">&times;</button>
    <video id="overlay-video" muted playsinline webkit-playsinline loop></video>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { MindARThree } from 'mindar-image-three';

    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const uiOverlay = document.getElementById('ui-overlay');
    const hint = document.getElementById('hint');

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      startBtn.textContent = 'Chargement...';
      try {
        const mindar = new MindARThree({
          container: document.getElementById('container'),
          imageTargetSrc: './assets/targets.mind',
          uiLoading: 'no', uiScanning: 'no', uiError: 'no',
          // Lissage du tracking : valeurs PLUS PETITES = plus stable (filtre OneEuro)
          filterMinCF: 0.00001,
          filterBeta: 0.0001,
          missTolerance: 10,    // tolere 10 frames manquees avant 'lost'
          warmupTolerance: 5    // confirme detection sur 5 frames avant declaration
        });
        const { renderer, scene, camera } = mindar;

        // === Configuration des cibles ===
        // Chaque entree : index = targetIndex dans le .mind, src = video associee
        const TARGETS = [
          { index: 0, src: './assets/videos/clip0.mp4' },
          { index: 1, src: './assets/videos/clip1.mp4' },
          { index: 2, src: './assets/videos/clip2.mp4' },
          { index: 3, src: './assets/videos/clip3.mp4' }
        ];

        const OVERSIZE = 1.05;
        const POP_DURATION = 350; // ms : anim apparition vidéo plaquée
        const OVERLAY_DELAY = 900; // ms : delai avant ouverture overlay plein ecran
        const scanFrame = document.getElementById('scan-frame');
        const videoOverlay = document.getElementById('video-overlay');
        const overlayVideo = document.getElementById('overlay-video');
        const overlayClose = document.getElementById('video-close');

        let overlayActive = false;
        let activeCfg = null;

        function openOverlay(cfg) {
          if (overlayActive) return;
          overlayActive = true;
          activeCfg = cfg;
          overlayVideo.src = cfg.src;
          overlayVideo.muted = true;
          overlayVideo.loop = true;
          overlayVideo.play().catch(() => {});
          // attendre 1 frame avant d'ajouter .active pour que la transition CSS demarre
          requestAnimationFrame(() => videoOverlay.classList.add('active'));
        }
        function closeOverlay() {
          videoOverlay.classList.remove('active');
          overlayVideo.pause();
          setTimeout(() => {
            overlayVideo.removeAttribute('src');
            overlayVideo.load();
            overlayActive = false;
            activeCfg = null;
          }, 500);
        }
        overlayClose.addEventListener('click', closeOverlay);

        // Cree un overlay video pour chaque cible
        for (const cfg of TARGETS) {
          const anchor = mindar.addAnchor(cfg.index);

          const videoEl = document.createElement('video');
          videoEl.src = cfg.src;
          videoEl.muted = true;
          videoEl.loop = true;
          videoEl.playsInline = true;
          videoEl.setAttribute('playsinline', '');
          videoEl.setAttribute('webkit-playsinline', '');
          videoEl.crossOrigin = 'anonymous';
          videoEl.preload = 'auto';
          videoEl.style.display = 'none';
          document.body.appendChild(videoEl);

          let textureLoaded = false;
          const texture = new THREE.VideoTexture(videoEl);
          texture.minFilter = THREE.LinearFilter;
          texture.magFilter = THREE.LinearFilter;
          texture.format = THREE.RGBAFormat;

          videoEl.addEventListener('loadedmetadata', () => {
            textureLoaded = true;
            applyFit();
          });
          if (videoEl.readyState >= 1) {
            textureLoaded = true;
          }

          const geometry = new THREE.PlaneGeometry(1, 1);
          const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
          const plane = new THREE.Mesh(geometry, material);
          anchor.group.add(plane);

          // Plane scale au ratio de la VIDEO (pas de la cible) -> respecte format video natif
          function applyFit() {
            if (!textureLoaded) return;
            const srcW = videoEl.videoWidth;
            const srcH = videoEl.videoHeight;
            if (!srcW || !srcH) return;
            const videoRatio = srcH / srcW;
            // Plane plein largeur de la cible (1), hauteur = ratio video
            plane.scale.set(OVERSIZE, OVERSIZE * videoRatio, OVERSIZE);
            // Pas de UV crop : la video est rendue en entier (sans deformation)
            texture.repeat.set(1, 1);
            texture.offset.set(0, 0);
            texture.needsUpdate = true;
          }

          let pendingOverlayTimer = null;

          anchor.onTargetFound = () => {
            if (overlayActive) return; // un overlay deja affiche, on ignore
            hint.classList.add('hidden');
            scanFrame.classList.add('hidden');
            applyFit();

            // 1. Anim pop-in de la video plaquee
            const startTime = performance.now();
            const baseScale = plane.scale.clone();
            function popAnim(now) {
              const t = Math.min(1, (now - startTime) / POP_DURATION);
              // ease out cubic
              const eased = 1 - Math.pow(1 - t, 3);
              const s = eased; // 0 -> 1
              plane.scale.set(baseScale.x * s, baseScale.y * s, baseScale.z * s);
              if (t < 1) requestAnimationFrame(popAnim);
            }
            requestAnimationFrame(popAnim);

            videoEl.play().catch(e => console.warn('video play blocked', cfg.index, e));

            // 2. Apres delai, ouvrir overlay plein ecran (effet "approche")
            clearTimeout(pendingOverlayTimer);
            pendingOverlayTimer = setTimeout(() => openOverlay(cfg), OVERLAY_DELAY);
          };
          anchor.onTargetLost = () => {
            // si pas encore overlay ouvert, on annule
            clearTimeout(pendingOverlayTimer);
            if (!overlayActive) {
              hint.classList.remove('hidden');
              scanFrame.classList.remove('hidden');
              videoEl.pause();
            }
          };
        }

        await mindar.start();
        renderer.setAnimationLoop(() => renderer.render(scene, camera));

        startOverlay.classList.add('hidden');
        uiOverlay.classList.remove('hidden');

        // Toggle plein ecran (cover) <-> voir tout (contain)
        document.getElementById('cam-toggle').addEventListener('click', () => {
          document.body.classList.toggle('camera-contain');
        });
      } catch (err) {
        console.error(err);
        alert('Erreur : ' + err.message);
        startBtn.disabled = false;
        startBtn.textContent = 'Reessayer';
      }
    });
  </script>

  <style>
    #container {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1; background: #000;
      overflow: hidden;
    }
    /* Cam et canvas Three.js : remplir plein ecran sans deformer.
       cover = remplit tout, crop ce qui depasse. */
    #container > video, #container > canvas {
      position: absolute !important;
      top: 50% !important;
      left: 50% !important;
      width: 100% !important;
      height: 100% !important;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }
    /* Mode "contain" pour voir tout le flux camera (bandes noires possibles) */
    body.camera-contain #container > video,
    body.camera-contain #container > canvas {
      object-fit: contain;
    }
    #ui-overlay { z-index: 500; pointer-events: none; }
    #ui-overlay .btn-icon, #ui-overlay .hint { pointer-events: auto; }
    #start-overlay { z-index: 1000; }

    /* Bouton toggle vue cam (cover/contain) */
    .cam-toggle {
      position: absolute;
      top: calc(env(safe-area-inset-top, 12px) + 8px);
      right: 12px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      pointer-events: auto;
      font-size: 1.2rem;
      cursor: pointer;
    }

    /* Overlay video plein ecran avec anim zoom-in fluide */
    .video-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0, 0, 0, 0);
      backdrop-filter: blur(0px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease-out, background-color 0.5s ease-out, backdrop-filter 0.5s ease-out;
    }
    .video-overlay.active {
      opacity: 1;
      pointer-events: auto;
      background: rgba(10, 10, 20, 0.92);
      backdrop-filter: blur(20px);
    }
    .video-overlay video {
      max-width: 96vw;
      max-height: 88vh;
      transform: scale(0.4);
      opacity: 0;
      transition:
        transform 0.7s cubic-bezier(0.16, 1, 0.3, 1),
        opacity 0.45s ease-out;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      background: #000;
    }
    .video-overlay.active video {
      transform: scale(1);
      opacity: 1;
    }
    .video-close {
      position: absolute;
      top: calc(env(safe-area-inset-top, 12px) + 12px);
      right: 16px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
      font-size: 1.6rem;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }
  </style>

</body>
</html>
