<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#000000">
  <title>Poster AR (Three.js)</title>
  <link rel="stylesheet" href="css/ui.css">

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.147.0/examples/jsm/",
        "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
      }
    }
  </script>
</head>
<body class="ar">

  <div id="start-overlay" class="overlay-screen">
    <div class="card">
      <h2>AR plaque</h2>
      <p>Pointe vers l'image cible apres avoir active la camera.</p>
      <button id="start-btn" class="btn primary">Activer la camera</button>
      <a href="ar.html" class="btn-link">Fallback HTML overlay</a>
    </div>
  </div>

  <div id="ui-overlay" class="hidden">
    <a href="index.html" class="btn-icon back" aria-label="Retour">&larr;</a>
    <button id="cam-toggle" class="cam-toggle" aria-label="Mode camera" title="Basculer vue camera (plein / complete)">&#x21F2;</button>
    <div id="hint" class="hint">Pointez vers une image du poster</div>
    <div id="scan-frame" class="scan-frame"><span></span></div>
  </div>

  <div id="container"></div>

  <script type="module">
    import * as THREE from 'three';
    import { MindARThree } from 'mindar-image-three';

    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const uiOverlay = document.getElementById('ui-overlay');
    const hint = document.getElementById('hint');

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      startBtn.textContent = 'Chargement...';
      try {
        const mindar = new MindARThree({
          container: document.getElementById('container'),
          imageTargetSrc: './assets/targets.mind',
          uiLoading: 'no', uiScanning: 'no', uiError: 'no',
          // Lissage du tracking pour reduire le tremblement
          filterMinCF: 0.001,    // freq de coupure min (plus haut = plus lisse)
          filterBeta: 1000,      // beta du filtre OneEuro (plus haut = plus lisse)
          missTolerance: 5,      // tolere 5 frames manquees avant 'lost'
          warmupTolerance: 5     // confirme detection sur 5 frames
        });
        const { renderer, scene, camera } = mindar;
        const anchor = mindar.addAnchor(0);

        // Photo plaquee : texture locale + auto-fit "cover" sur la cible
        const loader = new THREE.TextureLoader();
        let textureLoaded = false;
        const texture = loader.load('./assets/images/placeholder.jpg', () => {
          textureLoaded = true;
          applyFit();
        });

        // PlaneGeometry(1, 1) ; on scalera Y au ratio de la cible une fois detectee
        const geometry = new THREE.PlaneGeometry(1, 1);
        const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
        const plane = new THREE.Mesh(geometry, material);
        anchor.group.add(plane);

        let targetRatio = null; // height/width de la cible (deduit de la matrix MindAR)

        function applyFit() {
          if (!textureLoaded || targetRatio === null) return;
          // 1. Ajuster le plane au ratio EXACT de la cible
          plane.scale.set(1, targetRatio, 1);
          // 2. Calculer UV "cover" pour cropper la photo (pas de deformation)
          const tgtAspect = 1 / targetRatio; // largeur/hauteur cible
          const img = texture.image;
          const photoAspect = img.width / img.height;
          if (photoAspect > tgtAspect) {
            // Photo + paysage que la cible : crop gauche/droite
            const r = tgtAspect / photoAspect;
            texture.repeat.set(r, 1);
            texture.offset.set((1 - r) / 2, 0);
          } else {
            // Photo + portrait que la cible : crop haut/bas
            const r = photoAspect / tgtAspect;
            texture.repeat.set(1, r);
            texture.offset.set(0, (1 - r) / 2);
          }
          texture.needsUpdate = true;
        }

        const scanFrame = document.getElementById('scan-frame');
        anchor.onTargetFound = () => {
          hint.classList.add('hidden');
          scanFrame.classList.add('hidden');
          // A la 1ere detection, lire le ratio de la cible depuis la matrix
          if (targetRatio === null) {
            const m = anchor.group.matrix.elements;
            const sx = Math.sqrt(m[0]*m[0] + m[1]*m[1] + m[2]*m[2]);
            const sy = Math.sqrt(m[4]*m[4] + m[5]*m[5] + m[6]*m[6]);
            if (sx > 0 && sy > 0) {
              targetRatio = sy / sx;
              applyFit();
            }
          }
        };
        anchor.onTargetLost = () => {
          hint.classList.remove('hidden');
          scanFrame.classList.remove('hidden');
        };

        await mindar.start();
        renderer.setAnimationLoop(() => renderer.render(scene, camera));

        startOverlay.classList.add('hidden');
        uiOverlay.classList.remove('hidden');

        // Toggle plein ecran (cover) <-> voir tout (contain)
        document.getElementById('cam-toggle').addEventListener('click', () => {
          document.body.classList.toggle('camera-contain');
        });
      } catch (err) {
        console.error(err);
        alert('Erreur : ' + err.message);
        startBtn.disabled = false;
        startBtn.textContent = 'Reessayer';
      }
    });
  </script>

  <style>
    #container {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 1; background: #000;
      overflow: hidden;
    }
    /* Cam et canvas Three.js : remplir plein ecran sans deformer.
       cover = remplit tout, crop ce qui depasse. */
    #container > video, #container > canvas {
      position: absolute !important;
      top: 50% !important;
      left: 50% !important;
      width: 100% !important;
      height: 100% !important;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }
    /* Mode "contain" pour voir tout le flux camera (bandes noires possibles) */
    body.camera-contain #container > video,
    body.camera-contain #container > canvas {
      object-fit: contain;
    }
    #ui-overlay { z-index: 500; pointer-events: none; }
    #ui-overlay .btn-icon, #ui-overlay .hint { pointer-events: auto; }
    #start-overlay { z-index: 1000; }

    /* Bouton toggle vue cam (cover/contain) */
    .cam-toggle {
      position: absolute;
      top: calc(env(safe-area-inset-top, 12px) + 8px);
      right: 12px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      pointer-events: auto;
      font-size: 1.2rem;
      cursor: pointer;
    }
  </style>

</body>
</html>
