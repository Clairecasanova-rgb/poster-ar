<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#000000">
  <title>Poster AR (Three.js)</title>
  <link rel="stylesheet" href="css/ui.css">
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
</head>
<body class="ar">

  <div id="start-overlay" class="overlay-screen">
    <div class="card">
      <h2>AR plaque (Three.js)</h2>
      <p>Test du rendu AR direct via Three.js, sans A-Frame.</p>
      <button id="start-btn" class="btn primary">Activer la camera</button>
      <a href="ar.html" class="btn-link">Fallback HTML overlay</a>
    </div>
  </div>

  <div id="ui-overlay" class="hidden">
    <a href="index.html" class="btn-icon back" aria-label="Retour">&larr;</a>
    <div id="hint" class="hint">Pointez vers une image du poster</div>
    <div id="debug" class="debug">
      <div>Mode : <span class="ok">Three.js</span></div>
      <div>Etat : <span id="dbg-state">pret</span></div>
      <div>Detection : <span id="dbg-detect">aucune</span></div>
    </div>
  </div>

  <div id="container" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1;background:#000;"></div>

  <script>
    const startOverlay = document.getElementById('start-overlay');
    const startBtn = document.getElementById('start-btn');
    const uiOverlay = document.getElementById('ui-overlay');
    const hint = document.getElementById('hint');
    const dbgState = document.getElementById('dbg-state');
    const dbgDetect = document.getElementById('dbg-detect');

    function setDbg(el, txt, cls) { el.textContent = txt; el.className = cls || ''; }

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      startBtn.textContent = 'Chargement...';
      try {
        if (!window.MINDAR || !window.MINDAR.IMAGE) throw new Error('MindAR non charge');
        if (!window.THREE) throw new Error('Three.js non charge');

        const mindarThree = new window.MINDAR.IMAGE.MindARThree({
          container: document.querySelector('#container'),
          imageTargetSrc: './assets/targets.mind',
          uiLoading: 'no',
          uiScanning: 'no',
          uiError: 'no'
        });
        setDbg(dbgState, 'instance creee', 'ok');

        const { renderer, scene, camera } = mindarThree;
        const anchor = mindarThree.addAnchor(0);

        // Charger photo placeholder via TextureLoader
        const loader = new THREE.TextureLoader();
        loader.crossOrigin = 'anonymous';
        const texture = loader.load(
          'https://picsum.photos/seed/poster-ar/1200/900',
          () => setDbg(dbgState, 'photo + mindar prets', 'ok'),
          undefined,
          (err) => setDbg(dbgState, 'photo err: ' + err, 'err')
        );

        const geometry = new THREE.PlaneGeometry(1, 0.75);
        const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
        const plane = new THREE.Mesh(geometry, material);
        anchor.group.add(plane);
        anchor.group.visible = false; // cache jusqu'a detection

        let scaleFixed = false;

        anchor.onTargetFound = () => {
          hint.classList.add('hidden');
          setDbg(dbgDetect, 'detect...', 'ok');
        };
        anchor.onTargetLost = () => {
          hint.classList.remove('hidden');
          setDbg(dbgDetect, 'perdue', 'warn');
        };

        await mindarThree.start();
        const container = document.querySelector('#container');
        const nVideo = container.querySelectorAll('video').length;
        const nCanvas = container.querySelectorAll('canvas').length;
        setDbg(dbgState, `AR demarre (v=${nVideo}, c=${nCanvas})`, 'ok');

        let frameCount = 0;
        renderer.setAnimationLoop(() => {
          if (anchor.group.visible) {
            const m = anchor.group.matrix.elements;
            const sx = Math.sqrt(m[0]**2 + m[1]**2 + m[2]**2);
            // Compensation scale automatique + translation
            if (!scaleFixed && sx > 10) {
              const k = 1 / sx;
              plane.scale.setScalar(k);
              // Compense aussi la translation : divise les distances par sx
              plane.position.set(0, 0, 0);
              scaleFixed = true;
            }
            if (frameCount % 30 === 0) {
              setDbg(dbgDetect,
                `sx=${sx.toFixed(0)} t=${m[12].toFixed(0)},${m[13].toFixed(0)},${m[14].toFixed(0)}`,
                'ok');
            }
            frameCount++;
          }
          renderer.render(scene, camera);
        });

        startOverlay.classList.add('hidden');
        uiOverlay.classList.remove('hidden');
      } catch (err) {
        console.error(err);
        setDbg(dbgState, 'erreur: ' + (err.message || err), 'err');
        startBtn.disabled = false;
        startBtn.textContent = 'Reessayer';
      }
    });
  </script>

  <style>
    #container > video, #container > canvas {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
    }
    #ui-overlay { z-index: 500; }
    #start-overlay { z-index: 1000; }
  </style>

</body>
</html>
