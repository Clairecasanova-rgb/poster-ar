<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#0a0a14">
  <title>Preview palettes</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh; min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: background 0.4s ease, color 0.4s ease;
      background: var(--bg);
      color: var(--text);
    }
    a { color: inherit; }

    /* === PALETTES (CSS vars) === */
    /* Palette Pierre & ocre (par defaut) */
    :root {
      --bg: #f4ecd8;
      --text: #3d2817;
      --text-muted: rgba(61, 40, 23, 0.6);
      --text-soft: rgba(61, 40, 23, 0.85);
      --accent: #a04a2b;
      --accent-2: #c19a4d;
      --border: rgba(61, 40, 23, 0.15);
      --card-bg: rgba(61, 40, 23, 0.04);
      --cta-bg: linear-gradient(135deg, #a04a2b 0%, #8b3a1f 100%);
      --cta-shadow: rgba(160, 74, 43, 0.35);
      --cta-fixed-fade: linear-gradient(180deg, rgba(244,236,216,0) 0%, rgba(244,236,216,0.96) 35%);
      --picker-bg: rgba(244, 236, 216, 0.92);
      --picker-border: rgba(61, 40, 23, 0.12);
    }
    /* Palette Academique (blanc + marine) */
    body.palette-aca {
      --bg: #fafaf7;
      --text: #1a1a1a;
      --text-muted: rgba(26, 26, 26, 0.55);
      --text-soft: rgba(26, 26, 26, 0.8);
      --accent: #1a3a5c;
      --accent-2: #3a6a99;
      --border: rgba(26, 26, 26, 0.12);
      --card-bg: rgba(26, 26, 26, 0.03);
      --cta-bg: linear-gradient(135deg, #1a3a5c 0%, #0f2440 100%);
      --cta-shadow: rgba(26, 58, 92, 0.3);
      --cta-fixed-fade: linear-gradient(180deg, rgba(250,250,247,0) 0%, rgba(250,250,247,0.96) 35%);
      --picker-bg: rgba(250, 250, 247, 0.92);
      --picker-border: rgba(26, 26, 26, 0.1);
    }
    /* Palette Nuit & or */
    body.palette-nuit {
      --bg: #1a2332;
      --text: #f4ecd8;
      --text-muted: rgba(244, 236, 216, 0.6);
      --text-soft: rgba(244, 236, 216, 0.85);
      --accent: #c9a36d;
      --accent-2: #e6c89a;
      --border: rgba(244, 236, 216, 0.15);
      --card-bg: rgba(244, 236, 216, 0.05);
      --cta-bg: linear-gradient(135deg, #c9a36d 0%, #a48450 100%);
      --cta-shadow: rgba(201, 163, 109, 0.4);
      --cta-fixed-fade: linear-gradient(180deg, rgba(26,35,50,0) 0%, rgba(26,35,50,0.96) 35%);
      --picker-bg: rgba(26, 35, 50, 0.92);
      --picker-border: rgba(244, 236, 216, 0.12);
    }
    /* Palette Ardoise & rouille */
    body.palette-ardoise {
      --bg: #e8e5e0;
      --text: #2c3e50;
      --text-muted: rgba(44, 62, 80, 0.55);
      --text-soft: rgba(44, 62, 80, 0.8);
      --accent: #a85a3b;
      --accent-2: #c47a5b;
      --border: rgba(44, 62, 80, 0.13);
      --card-bg: rgba(44, 62, 80, 0.04);
      --cta-bg: linear-gradient(135deg, #2c3e50 0%, #1a2733 100%);
      --cta-shadow: rgba(44, 62, 80, 0.3);
      --cta-fixed-fade: linear-gradient(180deg, rgba(232,229,224,0) 0%, rgba(232,229,224,0.96) 35%);
      --picker-bg: rgba(232, 229, 224, 0.92);
      --picker-border: rgba(44, 62, 80, 0.12);
    }

    /* === Selecteur de palette === */
    #picker {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      display: flex;
      background: var(--picker-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--picker-border);
      padding: env(safe-area-inset-top, 8px) 4px 0;
    }
    #picker button {
      flex: 1;
      padding: 12px 4px;
      background: transparent;
      color: var(--text-muted);
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: color 0.3s, border-color 0.3s;
    }
    #picker button.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    /* === LAYOUT A === */
    .layout-a {
      min-height: 100vh; min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 24px calc(env(safe-area-inset-bottom, 16px) + 140px);
    }
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      max-width: 440px;
      width: 100%;
      gap: 24px;
    }
    .icon-frame {
      width: 88px; height: 88px;
      margin: 8px auto;
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }
    h1 {
      margin: 0;
      font-size: 1.65rem;
      line-height: 1.22;
      letter-spacing: -0.02em;
      font-weight: 600;
    }
    .sub {
      margin: 0;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text-soft);
      opacity: 0.85;
    }
    .author {
      margin-top: 32px;
      font-size: 0.85rem;
      line-height: 1.7;
      color: var(--text-muted);
    }
    .author strong {
      color: var(--text);
      font-weight: 600;
    }
    .author a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
    }
    .cta-fixed {
      position: fixed;
      left: 0; right: 0;
      bottom: 0;
      padding: 24px 24px calc(env(safe-area-inset-bottom, 16px) + 20px);
      background: var(--cta-fixed-fade);
      text-align: center;
    }
    .btn-cta {
      display: inline-block;
      padding: 16px 24px;
      width: 100%;
      max-width: 360px;
      background: var(--cta-bg);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 6px 20px var(--cta-shadow);
      transition: transform 0.15s;
    }
    .btn-cta:active { transform: translateY(1px); }
    .tip {
      margin: 12px 0 0;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body class="palette-pierre">

  <nav id="picker">
    <button data-palette="pierre" class="active">Pierre</button>
    <button data-palette="aca">Acad.</button>
    <button data-palette="nuit">Nuit</button>
    <button data-palette="ardoise">Ardoise</button>
  </nav>

  <section class="layout-a">
    <div class="hero">
      <div class="icon-frame">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V4h3M21 7V4h-3M3 17v3h3M21 17v3h-3"/>
          <rect x="8" y="9" width="8" height="6" rx="1"/>
        </svg>
      </div>
      <h1>Identifier, mesurer, comparer</h1>
      <p class="sub">L&rsquo;apport du num&eacute;rique pour la caract&eacute;risation des gravures rupestres</p>

      <div class="author">
        <strong>Claire CASANOVA</strong> &mdash; Doctorante 3<sup>e</sup> ann&eacute;e<br>
        <a href="mailto:casanova_c@univ-corse.fr">casanova_c@univ-corse.fr</a><br>
        <br>
        Direction&nbsp;: <strong>Pr Tony FOGACCI</strong> &amp; <strong>Dr Antonia COLONNA</strong><br>
        UMR CNRS 6240 LISA &middot; ICPP
      </div>
    </div>

    <div class="cta-fixed">
      <a class="btn-cta" href="ar-three.html">Activer la cam&eacute;ra</a>
      <p class="tip">Safari sur iPhone &middot; Chrome sur Android</p>
    </div>
  </section>

  <script>
    const picker = document.getElementById('picker');
    const body = document.body;
    picker.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const palette = btn.dataset.palette;
      picker.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
      body.className = 'palette-' + palette;
    });
  </script>

</body>
</html>
